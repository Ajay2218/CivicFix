<!DOCTYPE html>
{% extends 'dashboard.html' %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="card">
                  <div class="card-body">
                    <h4 class="card-title">Edit Category</h4>
                   
                    <form class="forms-sample" method="post" action="{% url 'update_category' cat_id=category.id %}">
                      {% csrf_token %}
                      <div class="form-group">
                        <label for="exampleInputUsername1">Category Name</label>
                        <input type="text" class="form-control" value="{{category.Category_name}}"  id="exampleInputUsername1" name="category_name" placeholder="Enter Category Name" required>
                      </div>
                      <div class="d-flex justify-content-center">
                        <button type="submit" class="btn btn-success w-25">Update</button>
                      </div>
                    </form>
                  </div>
                </div>
</body>
</html>
{% endblock %}
