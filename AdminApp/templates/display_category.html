<!DOCTYPE html>
{% extends 'dashboard.html' %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="card">
                  <div class="card-body">
                    <h4 class="card-title">Category Details</h4>
                    <div class="table-responsive">
                      <table class="table table-hover table-striped table-bordered">
                        <thead>
                          <tr>
                            <th>Category Name</th>
                            <th>Options</th>
                            
                          </tr>
                        </thead>
                        <tbody>
                          {% for i in category %}
                          <tr>
                            <td>{{i.Category_name}}</td>
                            <td>
                                <a href=" {% url 'edit_category' cat_id=i.id %} " class="btn btn-success">Edit</a>
                                <a href=" {% url 'delete_category' cat_id=i.id %} " class="btn btn-danger">Delete</a>
                            </td>
                           
                          </tr>

                          {% endfor %}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
</body>
</html>
{% endblock %}
